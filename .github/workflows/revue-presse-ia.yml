# v2
name: Revue de Presse IA

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  revue:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Collecter et publier
        env:
          GITHUB_TOKEN: ${{ secrets.REVUE_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python run_ci.py
